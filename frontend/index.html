<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width,
                 initial-scale=1.0">

  <title>UPI Payment</title>

  <link rel="stylesheet"
        href="style.css">

</head>

<body>

  <div class="container">

    <h2>Secure Payment</h2>

    <input
      type="text"
      id="name"
      placeholder="Enter Name"
    >

    <input
      type="number"
      id="amount"
      placeholder="Enter Amount"
    >

    <button onclick="payNow()">
      Pay Now
    </button>

    <div id="status"></div>

  </div>

  <!-- SCRIPT -->

  <script src="script.js"></script>

  <!-- RAZORPAY -->

  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

</body>

</html>
